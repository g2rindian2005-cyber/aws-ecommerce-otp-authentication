name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start Flask app
        run: |
          python backend/app.py > flask.log 2>&1 &
          sleep 15

      - name: Check Flask Logs
        run: |
          cat flask.log

      - name: Verify Flask Process
        run: |
          ps -ef | grep python

      - name: Health Check
        run: |
          curl --fail http://127.0.0.1:5000/api/ || curl --fail http://127.0.0.1:5000/api
